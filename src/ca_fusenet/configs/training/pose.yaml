input_key: "pose"

# Optimizer
weight_decay: 1e-4

# Learning rate
lr: 1e-3
lr_encoder: 1e-5

# Early stopping
patience: 10

# Freezing strategy
freeze_encoder_epochs: 0

# Data augmentation
use_augmentation: false
crop_size: 112

epochs: 30
batch_size: 32
num_workers: 2
val_split: 0.1
deterministic: false