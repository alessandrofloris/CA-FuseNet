input_key: "tublet"

# Optimizer
weight_decay: 1e-2

# Learning rate
lr: 1e-4
lr_backbone: 1e-5

# Early stopping
patience: 7

# Freezing strategy
freeze_encoder_epochs: 3

# Data augmentation
use_augmentation: false
crop_size: 112

epochs: 15
batch_size: 32
num_workers: 2
val_split: 0.1
deterministic: false